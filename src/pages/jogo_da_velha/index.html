<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jogo da Velha</title>
    <link rel="stylesheet" href="/styles/main.css" />
  </head>
  <body class="relative min-h-svh flex justify-center items-center font-[Inter]">
    <div class="grid grid-cols-3 w-fit">
      <div id="square1" class="h-28 w-28 sm:h-40 sm:w-40 md:h-52 md:w-52 border-b-4 border-r-4 border-emerald-500 flex text-center justify-center align-middle items-center text-[128px] text-emerald-500">o</div>
      <div id="square2" class="h-28 w-28 sm:h-40 sm:w-40 md:h-52 md:w-52 border-b-4 border-r-4 border-emerald-500 text-center justify-center align-middle items-center text-[128px] text-emerald-500">x</div>
      <div id="square3" class="h-28 w-28 sm:h-40 sm:w-40 md:h-52 md:w-52 border-b-4 border-emerald-500 text-center justify-center align-middle items-center text-[128px] text-emerald-500"></div>
      <div id="square4" class="h-28 w-28 sm:h-40 sm:w-40 md:h-52 md:w-52 border-b-4 border-r-4 border-emerald-500 text-center justify-center align-middle items-center text-[128px] text-emerald-500"></div>
      <div id="square5" class="h-28 w-28 sm:h-40 sm:w-40 md:h-52 md:w-52 border-b-4 border-r-4 border-emerald-500 text-center justify-center align-middle items-center text-[128px] text-emerald-500"></div>
      <div id="square6" class="h-28 w-28 sm:h-40 sm:w-40 md:h-52 md:w-52 border-b-4 border-emerald-500 text-center justify-center align-middle items-center text-[128px] text-emerald-500"></div>
      <div id="square7" class="h-28 w-28 sm:h-40 sm:w-40 md:h-52 md:w-52 border-r-4 border-emerald-500 text-center justify-center align-middle items-center text-[128px] text-emerald-500"></div>
      <div id="square8" class="h-28 w-28 sm:h-40 sm:w-40 md:h-52 md:w-52 border-r-4 border-emerald-500 text-center justify-center align-middle items-center text-[128px] text-emerald-500"></div>
      <div id="square9" class="h-28 w-28 sm:h-40 sm:w-40 md:h-52 md:w-52"></div>
    </div>

    <div class="absolute p-8 flex justify-center align-middle flex-col bg-emerald-700 h-96 text-white rounded-2xl">
      <div class="gap-28">
        <h1 class="text-2xl mb-9">Bem vindo ao jogo da velha</h1>

        <p class="mb-2">Digite seu nome:</p>
        <input id="PlayerName" type="text" class="rounded-full px-3 py-1 text-emerald-950 mb-7">
        
        <p class="mb-2">Escolha:</p>
        
        <div class="flex gap-3">
          <button id="ButtonX" class="text-4xl p-3 rounded-xl  transition-all duration-300 scale-110 bg-emerald-600 border-emerald-300 border-2">
            X
          </button>
          <button id="ButtonO" class="text-4xl bg-emerald-500 p-3 rounded-xl  transition-all duration-300">
            O
          </button>
        </div>

        <button class="w-full border-white border-2 rounded-full p-3 mt-12 text-xl hover:bg-emerald-600 hover:scale-110 transition-all duration-300" >
          Play
        </button>

      </div>
      

    </div>

    <script src="./index.js" type="module" ></script>
  </body>
</html>
